<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>単語道場 400|聞き流し音声解説</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF8F1; --card:#FFFFFF; --ink:#2A3350; --ink-soft:#6B7390;
  --red:#E2472F; --red-soft:#FBE3DE; --blue:#2E62C4; --blue-soft:#E2EAFA;
  --green:#2E9E63; --green-soft:#DDF2E6; --marker:#FFE066;
  --line:#E7E1D3; --radius:18px; --shadow:0 4px 14px rgba(42,51,80,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','BIZ UDGothic',sans-serif;
  background:var(--paper);
  background-image:repeating-linear-gradient(transparent 0 27px, rgba(226,71,47,.055) 27px 28px);
  color:var(--ink); min-height:100vh; display:flex; justify-content:center;
}
.app{width:100%;max-width:520px;padding:16px 16px 40px;display:flex;flex-direction:column;gap:14px}
header{display:flex;align-items:baseline;gap:8px}
header h1{font-size:22px;font-weight:900}
header h1 .red{color:var(--red)}
header .sub{font-size:11px;color:var(--ink-soft);font-weight:700}

.label{font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:2px solid var(--line);background:var(--card);color:var(--ink-soft);
  font-family:inherit;font-weight:700;font-size:13px;padding:8px 13px;border-radius:99px;cursor:pointer;transition:.15s}
.chip.on{border-color:var(--ink);background:var(--ink);color:#fff}
.chip:active{transform:scale(.95)}

/* 再生カード */
.player{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:26px 20px 20px;text-align:center;position:relative;overflow:hidden}
.player::before{content:"";position:absolute;top:14px;left:14px;width:20px;height:20px;border-radius:50%;
  background:var(--paper);border:3px solid #C9C2B2;box-shadow:inset 0 1px 2px rgba(0,0,0,.15)}
.pnum{position:absolute;top:16px;right:18px;font-size:12px;font-weight:900;color:var(--ink-soft)}
.pword{font-size:min(11vw,42px);font-weight:900;line-height:1.15;min-height:1.2em;word-break:break-word}
.pjp{font-size:min(6vw,22px);font-weight:900;color:var(--red);min-height:1.4em;margin-top:6px}
.pjp.hidden-mean{color:transparent;text-shadow:0 0 14px rgba(226,71,47,.55)}
.speaking-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);margin-left:8px;
  vertical-align:middle;opacity:0;transition:.2s}
.speaking .speaking-dot{opacity:1;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.25}}
.pprog{height:8px;background:#EFEAE0;border-radius:99px;overflow:hidden;margin-top:18px}
.pprog>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--blue),#6FA0F0);transition:width .3s}
.pcount{font-size:12px;font-weight:900;color:var(--ink-soft);margin-top:6px}

/* コントロール */
.ctrl{display:flex;justify-content:center;align-items:center;gap:14px;margin-top:4px}
.cbtn{font-family:inherit;border:2px solid var(--ink);background:var(--card);color:var(--ink);
  font-size:20px;font-weight:900;width:56px;height:56px;border-radius:50%;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
.cbtn.main{width:76px;height:76px;font-size:28px;background:var(--ink);color:#fff}
.cbtn:active{transform:scale(.92)}
.cbtn:disabled{opacity:.4}

.setrow{display:flex;gap:8px;flex-wrap:wrap}
.setbox{flex:1;min-width:140px;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:10px 12px}
.setbox .label{margin-bottom:4px}
select,input[type=range]{width:100%;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink)}
select{border:none;background:none;outline:none;padding:2px 0}
.note{font-size:11px;font-weight:700;color:var(--ink-soft);line-height:1.7;background:var(--marker);
  border-radius:12px;padding:10px 14px}
.note b{color:var(--red)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>単語<span class="red">道場</span> 🎧</h1>
    <span class="sub">聞き流し音声解説 400語</span>
  </header>

  <div>
    <div class="label">出題範囲</div>
    <div class="chips" id="rangeChips"></div>
  </div>

  <div class="player" id="player">
    <div class="pnum" id="pNum">No.–</div>
    <div class="pword" id="pWord">▶ を押してスタート<span class="speaking-dot"></span></div>
    <div class="pjp" id="pJp">英語 → 日本語の順に読み上げます</div>
    <div class="pprog"><i id="pBar"></i></div>
    <div class="pcount" id="pCount">– / –</div>
  </div>

  <div class="ctrl">
    <button class="cbtn" id="prevBtn" title="前の単語">⏮</button>
    <button class="cbtn main" id="playBtn" title="再生 / 一時停止">▶</button>
    <button class="cbtn" id="nextBtn" title="次の単語">⏭</button>
  </div>

  <div class="setrow">
    <div class="setbox">
      <div class="label">読み上げパターン</div>
      <select id="pattern">
        <option value="e2j">英語 ×2 → 日本語(標準)</option>
        <option value="ej">英語 → 日本語(はやい)</option>
        <option value="e_j">英語 → <考える時間> → 日本語(テスト)</option>
        <option value="j_e">日本語 → <考える時間> → 英語(和文英訳)</option>
      </select>
    </div>
    <div class="setbox">
      <div class="label">順番</div>
      <select id="order">
        <option value="seq">番号順</option>
        <option value="shuf">シャッフル</option>
      </select>
    </div>
  </div>
  <div class="setrow">
    <div class="setbox">
      <div class="label">スピード <span id="rateLabel">1.0</span>倍</div>
      <input type="range" id="rate" min="0.6" max="1.4" step="0.1" value="1.0">
    </div>
    <div class="setbox">
      <div class="label">くり返し</div>
      <select id="loop">
        <option value="0">1周で終了</option>
        <option value="1">ずっとループ</option>
      </select>
    </div>
  </div>

  <div class="note">
    📱 <b>iPhoneの人へ:</b> 本体横のマナーモードスイッチを<b>オフ(オレンジが見えない状態)</b>にして音量を上げてね。ファイルから開いて動かないときは、共有ボタン→<b>「Safariで開く」</b>で開くと動くよ。
    「テスト」パターンは音声のあとに考える時間があるから、<b>声に出して答える</b>と最強に覚えられるよ!
  </div>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function resetList(){
  stop();

  list=WORDS.filter(w=>w.n>=r.from&&w.n<=r.to);

}

/* ---- voices ---- */
let enVoice=null, jaVoice=null;
function pickVoices(){
  const vs=speechSynthesis.getVoices();
  enVoice = vs.find(v=>/^en(-|_)?(US|GB)/i.test(v.lang)&&/female|samantha|karen|zira|aria|jenny/i.test(v.name))
         || vs.find(v=>/^en/i.test(v.lang)) || null;
  jaVoice = vs.find(v=>/^ja/i.test(v.lang)&&/kyoko|nanami|haruka|o-?ren/i.test(v.name))
         || vs.find(v=>/^ja/i.test(v.lang)) || null;
}
speechSynthesis.onvoiceschanged = pickVoices;
pickVoices();

const utterRefs=[];               /* iOSのGCバグ対策: 参照を保持 */
let resumeTimer=null;
function keepAlive(){                 /* iOSは長い発話中に勝手にpauseすることがある */
  clearInterval(resumeTimer);
  resumeTimer=setInterval(()=>{ try{ if(speechSynthesis.speaking) speechSynthesis.resume(); }catch(e){} }, 3000);
}
function speak(text, lang, rateMul=1){
  return new Promise(res=>{
    if(!('speechSynthesis' in window)){ res(); return; }
    pickVoices();                     /* iOSはvoiceschangedが発火しないため毎回取得 */
    const u=new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = parseFloat($('rate').value) * rateMul;
    u.volume = 1;
    if(lang.startsWith('en') && enVoice) u.voice=enVoice;
    if(lang.startsWith('ja') && jaVoice) u.voice=jaVoice;
    let done=false;
    const finish=()=>{ if(!done){ done=true; res(); } };
    u.onend=finish; u.onerror=finish;
    /* onendが来ないiOSバグへの保険: 文字数から最大時間を見積もって強制次へ */
    const est = 1200 + text.length * 260 / u.rate;
    setTimeout(finish, Math.min(est, 15000));
    utterRefs.push(u); if(utterRefs.length>20) utterRefs.shift();
    speechSynthesis.speak(u);
    keepAlive();
  });
}
let unlocked=false;
function unlockAudio(){               /* iOSは最初のタップ内で一度鳴らして解錠する必要がある */
  if(unlocked || !('speechSynthesis' in window)) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; speechSynthesis.speak(u); speechSynthesis.resume();
  }catch(e){}
  unlocked=true;
}
const wait = ms => new Promise(r=>setTimeout(r, ms));

/* 意味の読み上げ用に記号をやわらかく */
function jpForSpeech(w){
  return w.jp.replace(/;/g,'、').replace(/…/g,'なになに').replace(/〜/g,'なになに')
             .replace(/\(/g,'、').replace(/\)/g,'、');
}
function enForSpeech(w){ return w.en.replace('/',' , or , '); }

async function playWord(w, myToken){
  const pat=$('pattern').value;
  $('pNum').textContent='No.'+w.n;
  $('pCount').textContent=(idx+1)+' / '+list.length;
  $('pBar').style.width=((idx+1)/list.length*100)+'%';
  $('player').classList.add('speaking');

  const showBoth=()=>{ $('pWord').innerHTML=w.en+'<span class="speaking-dot"></span>'; $('pJp').textContent=w.jp; $('pJp').classList.remove('hidden-mean'); };

  if(pat==='e2j'){
    showBoth();
    await speak(enForSpeech(w),'en-US'); if(token!==myToken)return;
    await wait(250);
    await speak(enForSpeech(w),'en-US',0.85); if(token!==myToken)return;
    await wait(250);
    await speak(jpForSpeech(w),'ja-JP'); if(token!==myToken)return;
    await wait(500);
  }else if(pat==='ej'){
    showBoth();
    await speak(enForSpeech(w),'en-US'); if(token!==myToken)return;
    await wait(200);
    await speak(jpForSpeech(w),'ja-JP'); if(token!==myToken)return;
    await wait(350);
  }else if(pat==='e_j'){
    $('pWord').innerHTML=w.en+'<span class="speaking-dot"></span>';
    $('pJp').textContent=w.jp; $('pJp').classList.add('hidden-mean');
    await speak(enForSpeech(w),'en-US'); if(token!==myToken)return;
    await wait(2300); if(token!==myToken)return;      /* 考える時間 */
    $('pJp').classList.remove('hidden-mean');
    await speak(jpForSpeech(w),'ja-JP'); if(token!==myToken)return;
    await wait(500);
  }else{ /* j_e */
    $('pWord').innerHTML='???<span class="speaking-dot"></span>';
    $('pJp').textContent=w.jp; $('pJp').classList.remove('hidden-mean');
    await speak(jpForSpeech(w),'ja-JP'); if(token!==myToken)return;
    await wait(2600); if(token!==myToken)return;
    $('pWord').innerHTML=w.en+'<span class="speaking-dot"></span>';
    await speak(enForSpeech(w),'en-US'); if(token!==myToken)return;
    await wait(500);
  }
  $('player').classList.remove('speaking');
}

async function playLoop(){
  const myToken=++token;
  playing=true; $('playBtn').textContent='⏸';
  while(playing && token===myToken){
    await playWord(list[idx], myToken);
    if(!playing || token!==myToken) break;
    if(idx<list.length-1) idx++;
    else if($('loop').value==='1'){ idx=0; if($('order').value==='shuf') shuffle(list); }
    else { stop(); $('pWord').innerHTML='🎉 一周おつかれさま!<span class="speaking-dot"></span>'; $('pJp').textContent='もう一周する?範囲を変える?'; break; }
  }
}
function stop(){
  playing=false; token++;
  clearInterval(resumeTimer);
  try{ speechSynthesis.cancel(); }catch(e){}
  $('playBtn').textContent='▶';
  $('player').classList.remove('speaking');
}

$('playBtn').onclick=()=>{ unlockAudio(); playing? stop() : playLoop(); };
$('nextBtn').onclick=()=>{ unlockAudio(); const was=playing; stop(); if(idx<list.length-1)idx++; else idx=0; was? playLoop(): (playWordPreview()); };
$('prevBtn').onclick=()=>{ unlockAudio(); const was=playing; stop(); if(idx>0)idx--; else idx=list.length-1; was? playLoop(): (playWordPreview()); };
function playWordPreview(){ const w=list[idx]; $('pNum').textContent='No.'+w.n; $('pWord').innerHTML=w.en+'<span class="speaking-dot"></span>'; $('pJp').textContent=w.jp; $('pJp').classList.remove('hidden-mean'); $('pCount').textContent=(idx+1)+' / '+list.length; $('pBar').style.width=((idx+1)/list.length*100)+'%'; }
$('order').onchange=resetList;
$('rate').oninput=()=>$('rateLabel').textContent=parseFloat($('rate').value).toFixed(1);

buildChips(); resetList();
if(!('speechSynthesis' in window)){
  $('pWord').textContent='この環境では音声を再生できません';
  $('pJp').textContent='SafariかChromeで開いてください';
}
</script>
</body>
</html>
